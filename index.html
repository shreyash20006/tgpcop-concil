<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGPCOP Student Council</title>
    <meta name="description" content="Official TGPCOP Student Council platform for notices, events, student resources, leadership updates, questions, and campus activities." />
    
    <!-- SEO & Canonical Metadata -->
    <link rel="canonical" href="https://tgpcopcouncil.online" />
    <meta name="metadataBase" content="https://tgpcopcouncil.online" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tgpcopcouncil.online" />
    <meta property="og:title" content="TGPCOP Student Council" />
    <meta property="og:description" content="Official TGPCOP Student Council platform for notices, events, student resources, leadership updates, questions, and campus activities." />
    <meta property="og:image" content="https://res.cloudinary.com/dsqxboxoc/image/upload/v1779522116/WhatsApp_Image_2026-05-23_at_1.10.29_PM_susb5a.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://tgpcopcouncil.online" />
    <meta name="twitter:title" content="TGPCOP Student Council" />
    <meta name="twitter:description" content="Official TGPCOP Student Council platform for notices, events, student resources, leadership updates, questions, and campus activities." />
    <meta name="twitter:image" content="https://res.cloudinary.com/dsqxboxoc/image/upload/v1779522116/WhatsApp_Image_2026-05-23_at_1.10.29_PM_susb5a.jpg" />
    <!-- Early theme detection: runs synchronously before paint to prevent flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tgpcop-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(t);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
